server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # AUTH
        - id: auth-service
          uri: http://auth-service:8084
          predicates:
            - Path=/auth/**

        # USER
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/users/**

        # PRODUCT
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/products/**

        # ORDER
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/orders/**


